telemetry = false
logLevel = "warn"

[console]
depth = 10

[run]
bun = true
silent = false

[install]
auto = "disable"
minimumReleaseAge = 259200
minimumReleaseAgeExcludes = ["@types/node", "typescript", "bun-types"]

[install.lockfile]
save = true

